projects:
  - category: Product Management
    number: "01"
    items:
    - title: THEO (Track, Harvest and Expand Opportunities)
      description: "Launched and drove the product development, a product that enables the early identification of client opportunities within the Deals function of KPMG. The product is deployed to 4 KPMG member firms."
    - title: KGCT (KPMG GAAP Conversion Tool)
      description: "KGCT is a software application developed as part of the Regulatory Driven Transformation initiative with the aim ofinnovating and digitizing KPMG services. While leading the development and implementation of this tool, I perfomed product management activities such as developing the business case for the product, managing the backlog and release schedule. "
    - title: Credit File Review
      description: "Developed a Credit File review application that was used within the Financial Risk Management function to optimize and improve the analysis of the credit file review."
    - title: EVR (Ergebnisvorschaurechnung)
      description: "EVR is a large banking product serving clients with the simulation of their businesses over a run of several years. Its complex business logic, used for profit and loss forecasting along with liquidity riskmanagement, makes it a challenge for development. The product has a high maturity level, where development happens through several cross-functional distributed teams."

  - category: Software Development Advisory
    number: "02"
    items:
    - title: Operational Stability Review
      description: "I led the assessment of the operational stability of a software platform, evaluating it across dimensions of architectural robustness, effectiveness of management processes, and communication with end-users and the client. The assessment was conducted through stakeholder and architect interviews and analysis of documentation and SLA reports. The resulting report detailed the findings and outlined concrete improvement actions."
    - title: Rebuild value estimation
      description: "I developed a rebuild estimation for a pension administrator through a structured analysis of functional scope, technical complexity, and available building blocks. This resulted in a transparent, parametric model in which assumptions, risks, and cost breakdowns were made explicit and reproducible."
    - title: Infrastructure Inventory
      description: "I led the infrastructure inventory of a subsidy management system and its associated data warehouse for a public sector entity. Beyond the inventory itself, the engagement included producing an estimation and migration plan proposal for a transition to a new hosting provider."
    - title: System assessment retail
      description: "I led a software quality review of a retailer's systems, including the software running on Point of Sale devices. My team and I reviewed the source code and documentation, providing ratings on maintainability, scalability, security, and reliability. The assessment combined automated tooling, SonarQube and OWASP, with manual code analysis."
    - title: Acquisition due diligence enery
      description: "As part of an acquisition process for a large energy company, I contributed to a due diligence review of a software product, assessing its technical quality across maintainability, reliability, security, and scalability, while also gaining insight into the development and operations processes. The IT landscape was large and complex, with many bespoke components."
    - title: Supporting internal IT audit e-commerce
      description: "I supported an internal audit across several product development teams at a large e-commerce investment company. My focus was on reviewing product development processes including backlog management, prioritisation methods, and alignment to the company's strategic goals."
    - title: Due diligence transport provider
      description: "As part of a larger due diligence project for a Swiss public transport provider, I performed a software quality assessment with a focus on analysing source code for maintainability, security, and reliability."
    - title: Software inventory and quality review
      description: "As part of a team engagement for a Dutch multinational professional services firm, I contributed to a software inventory and quality review covering maintainability, security, and reliability as defined by ISO 25010, alongside a value estimation of a digital platform. The review drew on available documentation, source code and artefact analysis, and interviews with key developers."
    - title: Solution architecture design
      description: "As part of a large modernisation programme at a public sector entity, I developed several architectural frameworks to guide the transition from monolithic systems to scalable, maintainable, and reliable microservices. These frameworks covered technology choices (Java, PostgreSQL), infrastructure (Kubernetes), messaging options, API gateway usage, and CI/CD tooling setup with a strong emphasis on maintainability, security, and reliability. I also coached the development teams, who were early in their maturity journey, and built several proof-of-concepts to accelerate both development and understanding. Throughout the engagement I acted as a bridge between the development teams, management, and enterprise architects."
    - title: DevOps maturity model design
      description: "I co-designed a DevOps maturity model as a KPMG asset that organisations can use to assess their maturity across development and continuous integration practices."

  - category: Organizational Change Advisory
    number: "03"
    items:
    - title: Coaching internal audit function
      description: "I worked as a coach at a large financial institution that developed their own way of working tailored to the internal audit function. Working side-by-side with audit teams, I translated the high-level design into the organisation and supported its implementation. I coached employees in their new roles, helped establish their rituals and backlogs, and led the setup and adoption of Azure DevOps as a work management tool to mature their new way of working."
    - title: Organizing big rool planning event
      description: "I was one of the consultants who organised and facilitated the first PI Planning events for a British bank, targeting the entire Cyber function spanning multiple teams and leadership at C-level and portfolio level. Given my strong SAFe expertise, I took on an advisory role for this first iteration, helping the team lay the foundations for their new agile way of working."
    - title: Trainer agile methodologies
      description: "I designed and delivered training programmes for several teams as part of a pan-African banking conglomerate's agile transformation. I was responsible for setting up the trainings, facilitating the sessions, and leading the Q&A discussions afterwards. Topics covered included backlog management, user story refinement, retrospectives and continuous improvement, estimation, planning and review, and agile mindset and culture."
    - title: Process design & implemention Data Platform 
      description: "I led the design and implementation of core processes for Data & Integration at an asset management company, serving as process implementation manager. My focus was on identifying key processes, aligning cross-functional teams, and driving change implementation at a global level covering areas such as incident and change management."
    - title: Leadership coaching
      description: "As an agile coach at a retail bank, I was responsible for coaching the value stream of loan products. I provided individual coaching for RTE, PM, PO, and SM roles, and extended coaching to their teams where needed. I also supported the RTE in organising PI Planning events and contributed to the setup of Lean Portfolio Management."
    - title: Funding model change within CFO 
      description: "I supported the financial controlling function of a large insurance company as a business agility expert. In this role, I guided and coached finance professionals through their transition to an agile funding model, teaching concepts of agile portfolio management to advance their understanding of agile ways of working and its implications for the finance function."
    - title: Target Operating Model design  
      description: "I was the driving force behind the design of the Target Operating Model that forms the core of the KPMG Powered Enterprise solution, a solution implemented worldwide and used across the KPMG network. Together with my team, I developed the software development and CI/CD components of the model. The KPMG Target Operating Model spans six focus areas Process, People, Service Delivery Model, Technology, Performance Insights, and Governance, and covers software quality, continuous integration, and continuous delivery in depth."
    
