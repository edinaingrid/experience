bio_lead: "I'm a software and organizational professional with over eleven years of experience at the intersection of technology and people, building products and advancing organisations."
bio: | 
    My work spans product management, software quality advisory, and organisational change, giving me a rare perspective that bridges technical depth with strategic and human dimensions. I've brought products to market, coached teams through complex transformations, and reviewed software across industries from banking to public sector. 
    
    Having started my career as a developer, I speak the language of both the boardroom and the development team, and I am particularly skilled at navigating the stakeholder landscape that sits between them. I thrive in environments where the challenge is not just building the right thing, but getting organisations ready to sustain it.

    Whether I am reviewing source code, coaching a leadership team, or designing a target operating model, the common thread is the same, namely making complex things work in practice, not just on paper.

